<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>칸반 보드 - 로그인</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>칸반 보드</h1>
            <p class="subtitle">작업을 쉽고 빠르게 관리하세요</p>

            <div class="tabs">
                <button class="tab active" data-tab="signin">로그인</button>
                <button class="tab" data-tab="signup">회원가입</button>
            </div>

            <!-- Sign In Form -->
            <form id="signinForm" class="auth-form active">
                <div class="form-group">
                    <label for="signin-email">이메일</label>
                    <input type="email" id="signin-email" required placeholder="example@email.com">
                </div>

                <div class="form-group">
                    <label for="signin-password">비밀번호</label>
                    <input type="password" id="signin-password" required placeholder="최소 6자 이상">
                </div>

                <button type="submit" class="btn btn-primary">로그인</button>
            </form>

            <!-- Sign Up Form -->
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="signup-email">이메일</label>
                    <input type="email" id="signup-email" required placeholder="example@email.com">
                </div>

                <div class="form-group">
                    <label for="signup-password">비밀번호</label>
                    <input type="password" id="signup-password" required placeholder="최소 6자 이상">
                </div>

                <div class="form-group">
                    <label for="signup-password-confirm">비밀번호 확인</label>
                    <input type="password" id="signup-password-confirm" required placeholder="비밀번호 재입력">
                </div>

                <button type="submit" class="btn btn-primary">회원가입</button>
            </form>

            <div class="divider">
                <span>또는</span>
            </div>

            <!-- OAuth Buttons -->
            <div class="oauth-buttons">
                <button id="googleBtn" class="btn btn-oauth btn-google">
                    <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd"><path d="M17.6 9.2l-.1-1.8H9v3.4h4.8C13.6 12 13 13 12 13.6v2.2h3a8.8 8.8 0 0 0 2.6-6.6z" fill="#4285F4"/><path d="M9 18c2.4 0 4.5-.8 6-2.2l-3-2.2a5.4 5.4 0 0 1-8-2.9H1V13a9 9 0 0 0 8 5z" fill="#34A853"/><path d="M4 10.7a5.4 5.4 0 0 1 0-3.4V5H1a9 9 0 0 0 0 8l3-2.3z" fill="#FBBC05"/><path d="M9 3.6c1.3 0 2.5.4 3.4 1.3L15 2.3A9 9 0 0 0 1 5l3 2.4a5.4 5.4 0 0 1 5-3.7z" fill="#EA4335"/></g></svg>
                    Google 계정으로 로그인
                </button>

                <button id="githubBtn" class="btn btn-oauth btn-github">
                    <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M9 0a9 9 0 0 0-2.8 17.5c.4 0 .6-.2.6-.4v-1.4c-2.4.5-3-1.2-3-1.2-.4-1-.9-1.3-.9-1.3-.8-.5 0-.5 0-.5.8 0 1.3.9 1.3.9.7 1.3 2 .9 2.4.7 0-.5.3-.9.5-1.1-1.8-.2-3.6-.9-3.6-4 0-.9.3-1.6.9-2.2 0-.2-.4-1 .1-2.1 0 0 .7-.2 2.4.9a8.2 8.2 0 0 1 4.4 0c1.6-1 2.4-.9 2.4-.9.5 1.1.2 1.9 0 2.1.5.6.8 1.3.8 2.2 0 3.2-1.9 3.8-3.7 4 .3.3.6.8.6 1.5v2.2c0 .2.2.5.6.4A9 9 0 0 0 9 0z"/></svg>
                    GitHub 계정으로 로그인
                </button>
            </div>

            <p class="info-text">
                💡 로그인하지 않고 <a href="kanban.html">바로 시작</a>할 수도 있습니다 (익명 사용)
            </p>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        const signinForm = document.getElementById('signinForm');
        const signupForm = document.getElementById('signupForm');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const tabName = tab.dataset.tab;
                if (tabName === 'signin') {
                    signinForm.classList.add('active');
                    signupForm.classList.remove('active');
                } else {
                    signinForm.classList.remove('active');
                    signupForm.classList.add('active');
                }
            });
        });

        // Initialize Supabase
        document.addEventListener('DOMContentLoaded', async () => {
            initSupabase();

            // Check if already logged in
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'app.html';
                return;
            }

            // Sign In
            signinForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('signin-email').value;
                const password = document.getElementById('signin-password').value;

                const user = await signInWithEmail(email, password);
                if (user) {
                    window.location.href = 'app.html';
                }
            });

            // Sign Up
            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;
                const confirmPassword = document.getElementById('signup-password-confirm').value;

                if (password !== confirmPassword) {
                    alert('비밀번호가 일치하지 않습니다.');
                    return;
                }

                if (password.length < 6) {
                    alert('비밀번호는 최소 6자 이상이어야 합니다.');
                    return;
                }

                await signUpWithEmail(email, password);
            });

            // Google OAuth
            document.getElementById('googleBtn').addEventListener('click', () => {
                signInWithGoogle();
            });

            // GitHub OAuth
            document.getElementById('githubBtn').addEventListener('click', () => {
                signInWithGithub();
            });
        });
    </script>
</body>
</html>
